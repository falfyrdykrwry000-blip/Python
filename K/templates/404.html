<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - الصفحة غير موجودة | نبض الحدث</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #2563eb;
            --dark: #0f172a;
            --light: #f8fafc;
            --gray: #64748b;
            --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --shadow-lg: 0 10px 25px rgba(0,0,0,0.2);
            --radius-lg: 20px;
            --radius-full: 50px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #f5f3ff 50%, #fff1f2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        /* ===== خلفية متحركة ===== */
        .bg-elements {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .floating-number {
            position: absolute;
            font-size: 15rem;
            font-weight: 900;
            opacity: 0.03;
            animation: floatAround 20s infinite ease-in-out;
            color: var(--primary);
        }

        .floating-number:nth-child(1) {
            top: -50px;
            left: -50px;
            animation-delay: 0s;
        }
        .floating-number:nth-child(2) {
            bottom: -50px;
            right: -50px;
            animation-delay: -7s;
        }
        .floating-number:nth-child(3) {
            top: 40%;
            left: 5%;
            font-size: 10rem;
            animation-delay: -14s;
        }

        @keyframes floatAround {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(40px, -30px) rotate(5deg); }
            50% { transform: translate(-20px, -60px) rotate(-3deg); }
            75% { transform: translate(-50px, 20px) rotate(2deg); }
        }

        /* ===== بطاقة الخطأ ===== */
        .error-container {
            position: relative;
            z-index: 1;
            text-align: center;
            max-width: 550px;
            width: 100%;
        }

        .error-icon {
            margin-bottom: 2rem;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .error-icon i {
            font-size: 7rem;
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 1rem;
            letter-spacing: -3px;
        }

        .error-title {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--dark);
            margin-bottom: 1rem;
        }

        .error-message {
            font-size: 1.1rem;
            color: var(--gray);
            margin-bottom: 2rem;
            line-height: 1.8;
        }

        .error-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.8rem 2rem;
            border: none;
            border-radius: var(--radius-full);
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Tajawal', sans-serif;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            font-size: 1rem;
        }

        .btn-primary {
            background: var(--gradient-1);
            color: white;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(102, 126, 234, 0.5);
        }

        .btn-outline {
            background: white;
            color: var(--primary);
            border: 2px solid #cbd5e1;
        }

        .btn-outline:hover {
            border-color: var(--primary);
            background: #f8fafc;
        }

        /* ===== روابط سريعة ===== */
        .quick-links {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 2.5rem;
            padding-top: 2rem;
            border-top: 1px solid #e2e8f0;
        }

        .quick-link {
            color: var(--gray);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .quick-link:hover { color: var(--primary); }

        /* ===== مؤقت العودة التلقائية ===== */
        .auto-redirect {
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: #94a3b8;
        }

        .countdown {
            color: var(--primary);
            font-weight: 700;
        }

        /* ===== تجاوب ===== */
        @media (max-width: 480px) {
            .error-code { font-size: 5rem; }
            .error-icon i { font-size: 4rem; }
            .error-title { font-size: 1.3rem; }
            .error-actions { flex-direction: column; }
            .btn { width: 100%; justify-content: center; }
            .floating-number { font-size: 8rem; }
        }
    </style>
</head>
<body>
    <!-- ===== خلفية متحركة ===== -->
    <div class="bg-elements">
        <div class="floating-number">404</div>
        <div class="floating-number">404</div>
        <div class="floating-number">404</div>
    </div>

    <!-- ===== محتوى الخطأ ===== -->
    <div class="error-container">
        <!-- أيقونة -->
        <div class="error-icon">
            <i class="fas fa-map-signs"></i>
        </div>

        <!-- كود الخطأ -->
        <div class="error-code">404</div>

        <!-- العنوان -->
        <h1 class="error-title">عفواً! الصفحة غير موجودة</h1>

        <!-- الرسالة -->
        <p class="error-message">
            يبدو أن الصفحة التي تبحث عنها قد تم نقلها أو حذفها. ربما أخطأت في كتابة الرابط، أو أن المحتوى لم يعد متاحاً.
        </p>

        <!-- أزرار الإجراءات -->
        <div class="error-actions">
            <a href="{{ url_for('index') }}" class="btn btn-primary">
                <i class="fas fa-home"></i> العودة للرئيسية
            </a>
            <a href="javascript:history.back()" class="btn btn-outline">
                <i class="fas fa-arrow-right"></i> الرجوع للخلف
            </a>
        </div>

        <!-- مؤقت العودة -->
        <p class="auto-redirect">
            سيتم توجيهك للصفحة الرئيسية خلال <span class="countdown" id="countdown">10</span> ثواني
        </p>

        <!-- روابط سريعة -->
        <div class="quick-links">
            <a href="{{ url_for('index') }}" class="quick-link">
                <i class="fas fa-home"></i> الرئيسية
            </a>
            <a href="{{ url_for('index') }}#search" class="quick-link">
                <i class="fas fa-search"></i> بحث
            </a>
            {% if not session.user_id %}
            <a href="{{ url_for('login') }}" class="quick-link">
                <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
            </a>
            {% endif %}
        </div>
    </div>

    <script>
        // ===== مؤقت العودة التلقائية =====
        let seconds = 10;
        const countdownEl = document.getElementById('countdown');
        
        const timer = setInterval(function() {
            seconds--;
            countdownEl.textContent = seconds;
            
            if (seconds <= 3) {
                countdownEl.style.color = '#ef4444';
                countdownEl.style.animation = 'pulse 0.5s infinite';
            }
            
            if (seconds <= 0) {
                clearInterval(timer);
                window.location.href = '/';
            }
        }, 1000);

        // ===== إلغاء المؤقت عند النقر على أي زر =====
        document.querySelectorAll('.btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                clearInterval(timer);
            });
        });

        // ===== تأثيرات إضافية =====
        document.addEventListener('DOMContentLoaded', function() {
            // إضافة تأثير الظهور التدريجي
            document.querySelector('.error-container').style.opacity = '0';
            document.querySelector('.error-container').style.transform = 'translateY(20px)';
            
            setTimeout(function() {
                document.querySelector('.error-container').style.transition = 'all 0.6s ease';
                document.querySelector('.error-container').style.opacity = '1';
                document.querySelector('.error-container').style.transform = 'translateY(0)';
            }, 100);
        });
    </script>

    <style>
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</body>
</html>
